broker:
  url: "http://127.0.0.1:9090"
  endpoint: "test"
  insecure_skip_verify: false
  auth_token: ""               # Authentication token (must match broker's token if auth is enabled)

socks5:
  listen: ":10800"

transport:
  poll_interval: "50ms"
  retry_backoff: "5s"
  # coalesce_window: "2ms"  # how long Write() waits before the first send of
                            # an idle-to-active burst, letting immediately-
                            # following writes merge into one HTTP request.
                            # Default 2ms if omitted.

logging:
  level: "debug"

