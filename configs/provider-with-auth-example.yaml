# Example Provider configuration with authentication enabled
# This token must match the broker's token

broker:
  url: "http://127.0.0.1:8080"
  endpoint: "default"
  insecure_skip_verify: false
  auth_token: "my-secret-token-123"  # Must match broker's auth.token

provider:
  scrub_headers: true
  dial_timeout: "10s"

transport:
  poll_interval: "50ms"
  retry_backoff: "5s"
  # coalesce_window: "2ms"  # how long Write() waits before the first send of
                            # an idle-to-active burst, letting immediately-
                            # following writes merge into one HTTP request.
                            # Default 2ms if omitted.

logging:
  level: "info"

# IMPORTANT: If the broker has auth enabled but uses plain HTTP (not HTTPS),
# your token will be transmitted in clear text. Always use HTTPS when auth
# is enabled.

