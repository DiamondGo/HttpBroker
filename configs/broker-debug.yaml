server:
  listen: ":9090"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
  status_endpoint_enabled: true  # Enable for debugging/monitoring
  unauthorized_redirect:
    enabled: false  # Redirect unauthorized requests instead of returning 401/404
    url: ""         # Example: "/login", "www.example.com", or "https://example.com"

tunnel:
  poll_timeout: "45s"
  session_timeout: "60m"
  # coalesce_window: "2ms"  # how long a long-poll response waits for more data
                            # to accumulate once any is available, instead of
                            # flushing immediately. Default 2ms if omitted.

auth:
  enabled: false
  token: ""  # Set a shared secret token when auth is enabled (e.g., "my-secret-token-123")

logging:
  level: "debug"

