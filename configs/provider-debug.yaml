broker:
  url: "http://127.0.0.1:9090"
  endpoint: "test"
  auth_token: ""               # Authentication token (must match broker's token if auth is enabled)

provider:
  scrub_headers: true
  dial_timeout: "10s"

transport:
  poll_interval: "50ms"
  poll_timeout: "45s"
  retry_backoff: "5s"

logging:
  level: "debug"

